spring:
  application:
    name: digital-dynamics-pms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:pms}
    password: ${SPRING_DATASOURCE_PASSWORD:pms}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${PMS_MAIL_HOST:localhost}
    port: ${PMS_MAIL_PORT:1025}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

pms:
  jwt:
    secret: ${PMS_JWT_SECRET:change-this-development-secret-that-is-at-least-32-bytes}
    expiration-minutes: ${PMS_JWT_EXPIRATION_MINUTES:480}

server:
  error:
    include-message: always
