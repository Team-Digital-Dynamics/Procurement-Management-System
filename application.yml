
spring:
  application:
    name: digital-dynamics-pms

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pms}
    username: ${SPRING_DATASOURCE_USERNAME:pms}
    password: ${SPRING_DATASOURCE_PASSWORD:pms}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${PMS_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
    port: ${PMS_MAIL_PORT:${MAIL_PORT:587}}
    protocol: ${PMS_MAIL_PROTOCOL:${MAIL_PROTOCOL:smtp}}
    username: ${PMS_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${PMS_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

pms:
  jwt:
    secret: ${PMS_JWT_SECRET:change-this-development-secret-that-is-at-least-32-bytes}
    expiration-minutes: ${PMS_JWT_EXPIRATION_MINUTES:480}
  mail:
    test-recipient: ${PMS_MAIL_TEST_RECIPIENT:admindigitaldynamics@gmail.com}

server:
  error:
    include-message: always
