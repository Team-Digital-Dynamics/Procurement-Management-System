
spring:
  application:
    name: digital-dynamics-pms

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pms}
    username: ${SPRING_DATASOURCE_USERNAME:pms}
    password: ${SPRING_DATASOURCE_PASSWORD:pms}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

pms:
  jwt:
    secret: ${PMS_JWT_SECRET:change-this-development-secret-that-is-at-least-32-bytes}
    expiration-minutes: ${PMS_JWT_EXPIRATION_MINUTES:480}

server:
  error:
    include-message: always
