<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Dynamics PMS | System Error</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="error-page-shell">
      <section class="error-card">
        <div class="error-code-panel">
          <h1>500</h1>
          <p>System Error</p>
        </div>

        <div class="error-content-panel">
          <p class="eyebrow">Something Went Wrong</p>
          <h2>The system could not complete your request.</h2>
          <p>
            An unexpected error occurred while processing your request. Please
            try again, or contact the System Administrator if the problem
            continues.
          </p>

          <div class="error-actions">
            <a class="btn btn-primary" href="/dashboard.html"
              >Back to Dashboard</a
            >
            <a class="btn btn-soft" href="/index.html">Go to Login</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
