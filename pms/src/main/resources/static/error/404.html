<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Dynamics PMS | Page Not Found</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="error-page-shell">
      <section class="error-card">
        <div class="error-code-panel">
          <h1>404</h1>
          <p>Page Not Found</p>
        </div>

        <div class="error-content-panel">
          <p class="eyebrow">Missing Page</p>
          <h2>We could not find that page.</h2>
          <p>
            The page you are looking for may have been moved, renamed or
            removed. Please return to the dashboard and continue from there.
          </p>

          <div class="error-actions">
            <a class="btn btn-primary" href="/dashboard.html"
              >Back to Dashboard</a
            >
            <a class="btn btn-soft" href="/index.html">Go to Login</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
