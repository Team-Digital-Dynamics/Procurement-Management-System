<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | Digital Dynamics PMS</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/api.js" defer></script>
  </head>

  <body>
    <div id="app"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        PMS.renderLayout(
          "notifications",
          "Notifications",
          "View, filter and manage your system notifications.",
        );

        renderNotificationsPage();
      });

      function renderNotificationsPage() {
        const notifications = PMS.getNotifications();

        PMS.setContent(`
        <section class="view-section">
          <div class="section-header">
            <div>
              <h2>Notification Centre</h2>
              <p>Keep track of unread alerts, system updates and action reminders.</p>
            </div>

            <div class="page-actions">
              <button id="addTestNotificationBtn" class="btn btn-soft" type="button">
                Add Test Notification
              </button>

              <button id="markAllReadBtn" class="btn btn-primary" type="button">
                Mark All as Read
              </button>

              <button id="clearReadBtn" class="btn btn-outline light-outline" type="button">
                Clear Read
              </button>
            </div>
          </div>

          <div class="grid-4">
            <article class="stat-card">
              <div class="label">Total Notifications</div>
              <div class="value">${notifications.length}</div>
            </article>

            <article class="stat-card">
              <div class="label">Unread</div>
              <div class="value">${notifications.filter((item) => !item.read).length}</div>
            </article>

            <article class="stat-card">
              <div class="label">Read</div>
              <div class="value">${notifications.filter((item) => item.read).length}</div>
            </article>

            <article class="stat-card">
              <div class="label">Latest</div>
              <div class="value">${notifications.length ? PMS.formatDate(notifications[0].createdAt) : "-"}</div>
            </article>
          </div>

          <div class="card">
            <div class="section-header">
              <div>
                <h2>All Notifications</h2>
                <p>Use the filter box to search by title, message, status or date.</p>
              </div>
            </div>

            <div id="notificationsTable"></div>
          </div>
        </section>
      `);

        renderNotificationsTable(notifications);
        attachNotificationEvents();
      }

      function renderNotificationsTable(notifications) {
        PMS.renderDataTable({
          container: "notificationsTable",
          title: "Notifications",
          rows: notifications,
          pageSize: 10,
          searchPlaceholder: "Filter notifications...",
          emptyTitle: "No notifications yet",
          emptyText: "You do not have any notifications to display.",
          columns: [
            {
              label: "Status",
              key: "read",
              render: function (item) {
                return item.read
                  ? '<span class="badge success">Read</span>'
                  : '<span class="badge warning">Unread</span>';
              },
              searchValue: function (item) {
                return item.read ? "Read" : "Unread";
              },
            },
            {
              label: "Title",
              key: "title",
              render: function (item) {
                return `
                <strong>${PMS.escapeHtml(item.title)}</strong>
                <p class="muted">${PMS.escapeHtml(item.message)}</p>
              `;
              },
              searchValue: function (item) {
                return `${item.title || ""} ${item.message || ""}`;
              },
            },
            {
              label: "Type",
              key: "type",
              render: function (item) {
                return PMS.statusBadge(item.type || "INFO");
              },
            },
            {
              label: "Date",
              key: "createdAt",
              render: function (item) {
                return PMS.escapeHtml(PMS.formatDateTime(item.createdAt));
              },
            },
            {
              label: "Actions",
              key: "actions",
              render: function (item) {
                return `
                <div class="action-row">
                  ${
                    item.read
                      ? `<button class="btn btn-soft btn-sm" data-action="mark-unread" data-id="${PMS.escapeHtml(item.id)}" type="button">Mark Unread</button>`
                      : `<button class="btn btn-soft btn-sm" data-action="mark-read" data-id="${PMS.escapeHtml(item.id)}" type="button">Mark Read</button>`
                  }

                  <button class="btn btn-danger btn-sm" data-action="delete" data-id="${PMS.escapeHtml(item.id)}" type="button">
                    Delete
                  </button>
                </div>
              `;
              },
              searchValue: function () {
                return "";
              },
            },
          ],
        });
      }

      function attachNotificationEvents() {
        const table = document.getElementById("notificationsTable");
        const markAllReadBtn = document.getElementById("markAllReadBtn");
        const clearReadBtn = document.getElementById("clearReadBtn");
        const addTestNotificationBtn = document.getElementById(
          "addTestNotificationBtn",
        );

        if (table) {
          table.addEventListener("click", async function (event) {
            const button = event.target.closest("button[data-action]");

            if (!button) return;

            const action = button.dataset.action;
            const id = button.dataset.id;

            if (action === "mark-read") {
              PMS.markNotificationRead(id);
              PMS.showToast("success", "Notification marked as read.");
              renderNotificationsPage();
            }

            if (action === "mark-unread") {
              markNotificationUnread(id);
              PMS.showToast("info", "Notification marked as unread.");
              renderNotificationsPage();
            }

            if (action === "delete") {
              const confirmed = await PMS.confirmAction({
                title: "Delete notification",
                message: "Are you sure you want to delete this notification?",
                confirmText: "Delete",
                cancelText: "Cancel",
                danger: true,
              });

              if (!confirmed) return;

              PMS.deleteNotification(id);
              PMS.showToast("success", "Notification deleted.");
              renderNotificationsPage();
            }
          });
        }

        if (markAllReadBtn) {
          markAllReadBtn.addEventListener("click", function () {
            PMS.markAllNotificationsRead();
            PMS.showToast("success", "All notifications marked as read.");
            renderNotificationsPage();
          });
        }

        if (clearReadBtn) {
          clearReadBtn.addEventListener("click", async function () {
            const confirmed = await PMS.confirmAction({
              title: "Clear read notifications",
              message:
                "This will delete all notifications that are already marked as read.",
              confirmText: "Clear Read",
              cancelText: "Cancel",
              danger: true,
            });

            if (!confirmed) return;

            const unreadOnly = PMS.getNotifications().filter(function (item) {
              return !item.read;
            });

            PMS.saveNotifications(unreadOnly);
            PMS.updateNotificationBadge();
            PMS.showToast("success", "Read notifications cleared.");
            renderNotificationsPage();
          });
        }

        if (addTestNotificationBtn) {
          addTestNotificationBtn.addEventListener("click", function () {
            PMS.addNotification({
              title: "Test Notification",
              message:
                "This is a test notification for the notification centre.",
              type: "INFO",
              read: false,
              link: "/notifications.html",
            });

            PMS.showToast("success", "Test notification added.");
            renderNotificationsPage();
          });
        }
      }

      function markNotificationUnread(id) {
        const notifications = PMS.getNotifications().map(function (item) {
          if (item.id === id) {
            return {
              ...item,
              read: false,
            };
          }

          return item;
        });

        PMS.saveNotifications(notifications);
        PMS.updateNotificationBadge();
      }
    </script>
  </body>
</html>
