spring:
  application:
    name: procurement-management-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${PMS_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
    port: ${PMS_MAIL_PORT:${MAIL_PORT:587}}
    protocol: ${PMS_MAIL_PROTOCOL:${MAIL_PROTOCOL:smtp}}
    username: ${PMS_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${PMS_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

pms:
  jwt:
    secret: ${PMS_JWT_SECRET:change-this-development-secret-that-is-at-least-32-bytes}
    expiration-minutes: ${PMS_JWT_EXPIRATION_MINUTES:480}

server:
  error:
    include-message: always

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
    username: ${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:pms}}
    password: ${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:pms}}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME}}
    password: ${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  task:
    execution:
      pool:
        core-size: ${APP_TASK_EXECUTION_CORE_SIZE:8}
        max-size: ${APP_TASK_EXECUTION_MAX_SIZE:32}
        queue-capacity: ${APP_TASK_EXECUTION_QUEUE_CAPACITY:500}

server:
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
